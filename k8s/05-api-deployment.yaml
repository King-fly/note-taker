apiVersion: apps/v1
kind: Deployment
metadata:
  name: classsync-api
  namespace: classsync
  labels:
    app: classsync-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: classsync-api
  template:
    metadata:
      labels:
        app: classsync-api
    spec:
      containers:
      - name: api
        image: classsync/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        - containerPort: 9090  # metrics port
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: REDIS_URL
        - name: CELERY_BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: CELERY_BROKER_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: CELERY_RESULT_BACKEND
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: classsync-secrets
              key: secret-key
        - name: LOCAL_AI_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: LOCAL_AI_BASE_URL
        - name: LOCAL_AI_MODEL
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: LOCAL_AI_MODEL
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: ENVIRONMENT
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: DEBUG
        - name: METRICS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: METRICS_ENABLED
        - name: METRICS_PORT
          valueFrom:
            configMapKeyRef:
              name: classsync-config
              key: METRICS_PORT
        volumeMounts:
        - name: uploads-volume
          mountPath: /app/uploads
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: classsync-api-service
  namespace: classsync
  labels:
    app: classsync-api
spec:
  selector:
    app: classsync-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      name: http
    - protocol: TCP
      port: 9090
      targetPort: 9090
      name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: classsync
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: classsync-api-hpa
  namespace: classsync
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: classsync-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80