apiVersion: v1
kind: Service
metadata:
  name: classsync-api-metrics
  namespace: classsync
  labels:
    app: classsync-api
    metrics: enabled
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/"
spec:
  selector:
    app: classsync-api
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      name: metrics
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: classsync-monitor
  namespace: classsync
  labels:
    app: classsync-api
    team: frontend
spec:
  selector:
    matchLabels:
      app: classsync-api
      metrics: enabled
  endpoints:
  - port: metrics
    interval: 30s
    path: /api/v1/health/metrics