version: "3.9"

services:
  # ── FastAPI Application ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "5555:5555"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///./data/notes_taker.db
      - DATABASE_URL_SYNC=sqlite:///./data/notes_taker.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOCAL_AI_BASE_URL=${LOCAL_AI_BASE_URL:-http://127.0.0.1:8085/v1}
      - LOCAL_AI_API_KEY=${LOCAL_AI_API_KEY:-omlx-yqha5fy1fm9aufeo}
      - LOCAL_AI_MODEL=${LOCAL_AI_MODEL:-Qwen3.6-35B-A3B-UD-MLX-4bit}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    volumes:
      - db_data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=4 --pool=prefork
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///./data/notes_taker.db
      - DATABASE_URL_SYNC=sqlite:///./data/notes_taker.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOCAL_AI_BASE_URL=${LOCAL_AI_BASE_URL:-http://127.0.0.1:8085/v1}
      - LOCAL_AI_API_KEY=${LOCAL_AI_API_KEY:-omlx-yqha5fy1fm9aufeo}
      - LOCAL_AI_MODEL=${LOCAL_AI_MODEL:-Qwen3.6-35B-A3B-UD-MLX-4bit}
    volumes:
      - db_data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  redis_data: