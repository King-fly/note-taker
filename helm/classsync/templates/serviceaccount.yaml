apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "classsync.serviceAccountName" . }}
  labels:
    {{- include "classsync.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.serviceAccount.create }}
automountServiceAccountToken: false
{{- end }}