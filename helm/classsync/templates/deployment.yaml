apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "classsync.fullname" . }}
  labels:
    {{- include "classsync.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "classsync.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "classsync.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "classsync.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:{{ .Values.secrets.dbPassword }}@{{ include "classsync.fullname" . }}-db:5432/{{ .Values.config.dbName | default "note_taker" }}"
            - name: REDIS_URL
              value: "redis://{{ include "classsync.fullname" . }}-redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://{{ include "classsync.fullname" . }}-redis:6379/1"
            - name: CELERY_RESULT_BACKEND
              value: "redis://{{ include "classsync.fullname" . }}-redis:6379/2"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "classsync.fullname" . }}-secrets
                  key: secret-key
            - name: LOCAL_AI_BASE_URL
              value: {{ .Values.config.localAiBaseUrl | quote }}
            - name: LOCAL_AI_MODEL
              value: {{ .Values.config.localAiModel | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.config.environment | quote }}
            - name: DEBUG
              value: {{ .Values.config.debug | quote }}
            - name: METRICS_ENABLED
              value: {{ .Values.config.metricsEnabled | quote }}
            - name: MAX_UPLOAD_SIZE
              value: {{ .Values.config.maxUploadSize | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: uploads-volume
              mountPath: /app/uploads
      volumes:
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: {{ include "classsync.fullname" . }}-uploads-pvc
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}