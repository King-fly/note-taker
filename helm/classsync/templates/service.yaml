apiVersion: v1
kind: Service
metadata:
  name: {{ include "classsync.fullname" . }}-service
  labels:
    {{- include "classsync.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
    - port: {{ .Values.service.metricsPort }}
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    {{- include "classsync.selectorLabels" . | nindent 4 }}